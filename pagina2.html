/* ── Logo ── */
.logo{
  display:flex;align-items:center;gap:10px;
  margin-bottom:28px;
  animation:fadeUp .5s ease both;
}
.flag{width:30px;height:20px;border-radius:3px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.flag span{flex:1}
.f1{background:#1a1a1a}.f2{background:#dd0000}.f3{background:#ffce00}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.05em;color:var(--dark)}

/* ── Card ── */
.card{
  background:var(--card);
  border-radius:24px;
  padding:40px 36px 36px;
  width:100%;max-width:480px;
  box-shadow:0 2px 4px rgba(0,0,0,.04),0 12px 40px rgba(0,0,0,.10),0 0 0 1px rgba(0,0,0,.04);
  animation:fadeUp .55s cubic-bezier(.22,1,.36,1) both;
  animation-delay:.1s;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(22px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Title ── */
.title{
  font-size:clamp(20px,5vw,26px);
  font-weight:700;
  line-height:1.25;
  color:var(--dark);
  margin-bottom:6px;
  text-align:center;
}
.title span{color:var(--red)}

/* ── Video ── */
.video-wrap{
  position:relative;
  margin:24px 0;
  border-radius:14px;
  overflow:hidden;
  background:#000;
  /* Shorts are 9:16 */
  aspect-ratio:9/16;
  max-height:480px;
  box-shadow:0 8px 32px rgba(0,0,0,.18);
}
.video-wrap iframe{
  position:absolute;inset:0;
  width:100%;height:100%;
  border:none;
}

/* ── Subtitle ── */
.subtitle{
  font-size:15px;
  color:var(--mid);
  font-weight:300;
  line-height:1.6;
  text-align:center;
  margin-bottom:28px;
}

/* ── CTA ── */
.btn{
  display:block;
  width:100%;
  padding:16px;
  background:var(--red);
  color:#fff;
  border:none;
  border-radius:var(--radius);
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;
  letter-spacing:.12em;
  cursor:pointer;
  text-align:center;
  text-decoration:none;
  transition:background .2s,transform .12s,box-shadow .2s;
  box-shadow:0 4px 18px rgba(232,54,42,.35);
}
.btn:hover{background:#c92b20;box-shadow:0 6px 24px rgba(232,54,42,.45)}
.btn:active{transform:scale(.98)}

/* ── Note ── */
.note{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:14px;font-size:12px;color:#aaa;font-weight:300;
}
.note svg{width:13px;height:13px;stroke:#aaa;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

@media(max-width:460px){
  .card{padding:28px 20px 28px}
}
